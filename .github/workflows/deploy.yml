name: Deploy Niki

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Web to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/682530198245/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'niki-deployer@niki-app-prod.iam.gserviceaccount.com'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared
        run: yarn workspace @niki/shared build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Clean Next.js cache
        run: rm -rf apps/web/.next apps/web/out

      - name: Build web
        run: yarn workspace @niki/web build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GOOGLE_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}

      - name: Deploy Firebase Hosting + Firestore rules
        run: firebase deploy --only hosting,firestore --project "${{ secrets.FIREBASE_PROJECT_ID }}"

  deploy-api:
    name: Deploy API to Cloud Run via Cloud Build
    runs-on: ubuntu-latest
    needs: deploy-web
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/682530198245/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'niki-deployer@niki-app-prod.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        run: gcloud builds submit --config cloudbuild.yaml --project "${{ secrets.GCP_PROJECT_ID }}" .
